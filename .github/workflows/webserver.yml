name: Webserver

on:
  push:
    branches: [main]
    paths:
      - "webserver/**"
      - ".github/workflows/webserver.yml"
  pull_request:
    paths:
      - "webserver/**"
      - ".github/workflows/webserver.yml"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webserver
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: webserver/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pytest --cov-report=xml --junitxml=junit.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: webserver-test-results
          path: |
            webserver/junit.xml
            webserver/coverage.xml
