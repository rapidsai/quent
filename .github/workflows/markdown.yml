name: Markdown

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".rumdl.toml"
      - ".github/workflows/markdown.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".rumdl.toml"
      - ".github/workflows/markdown.yml"

jobs:
  markdown:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: pipx run rumdl==0.1.67 check --diff
