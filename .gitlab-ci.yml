# Default configuration for all jobs
default:
  tags:
    - os/linux
  interruptible: true

# Control when pipelines are created
workflow:
  rules:
    # Run on merge requests
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Run on default branch
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Add UI jobs
include:
  - local: "ui/.gitlab-ci.yml"

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Define cache template for Cargo dependencies and build artifacts
.cargo_cache:
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo/registry/index
      - .cargo/registry/cache
      - .cargo/git/db
      - target/

# Rules for when to run Rust jobs (only checks for file changes)
.rust_rules:
  rules:
    - changes:
        - "**/*.rs"
        - "**/Cargo.toml"
        - "**/Cargo.lock"
        - "**/*.proto"
        - .gitlab-ci.yml

# Install system dependencies needed for Rust builds
.install_protoc:
  before_script:
    - apt-get update && apt-get install -y protobuf-compiler
    - protoc --version

stages:
  - prepare
  - format
  - lint
  - check
  - build
  - test

# Prepare dependencies once and share across all Rust jobs
prepare:
  stage: prepare
  image: rust:latest
  extends:
    - .cargo_cache
    - .rust_rules
  script:
    - rustc --version
    - cargo --version
    - cargo fetch --locked
  artifacts:
    paths:
      - .cargo/
      - Cargo.lock
    expire_in: 1 hour

rust:check:
  stage: check
  image: rust:latest
  extends:
    - .cargo_cache
    - .install_protoc
    - .rust_rules
  needs:
    - prepare
  script:
    - cargo check --workspace --all-targets --all-features --locked

rust:fmt:
  stage: format
  image: rust:latest
  extends: .rust_rules
  script:
    - rustup component add rustfmt
    - cargo fmt --all -- --check

rust:clippy:
  stage: lint
  image: rust:latest
  extends:
    - .cargo_cache
    - .install_protoc
    - .rust_rules
  needs:
    - prepare
  script:
    - rustup component add clippy
    - cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

markdown:check:
  stage: lint
  image: rust:latest
  extends: .rust_rules
  needs:
    - prepare
  script:
    - export PATH="$CARGO_HOME/bin:$PATH"
    - command -v rumdl || cargo install rumdl --locked
    - rumdl check --diff --exclude .cargo
  cache:
    key: rumdl-tools
    paths:
      - .cargo/bin/rumdl

rust:build:
  stage: build
  image: rust:latest
  extends:
    - .cargo_cache
    - .install_protoc
    - .rust_rules
  needs:
    - prepare
  script:
    - cargo build --workspace --all-features --locked --release
  artifacts:
    paths:
      - target/release/
    expire_in: 1 day

rust:test:
  stage: test
  image: rust:latest
  extends:
    - .cargo_cache
    - .install_protoc
    - .rust_rules
  needs:
    - prepare
  script:
    - cargo test --workspace --all-features --locked --all-targets
