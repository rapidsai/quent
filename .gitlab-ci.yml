# Default configuration for all jobs
default:
  tags:
    - os/linux
  interruptible: true

# Add UI jobs
include:
  - local: "ui/.gitlab-ci.yml"

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Define cache template for Cargo dependencies and build artifacts
.cargo_cache:
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo/registry/index
      - .cargo/registry/cache
      - .cargo/git/db
      - target/

# Install system dependencies needed for Rust builds
.install_protoc:
  before_script:
    - apt-get update && apt-get install -y protobuf-compiler
    - protoc --version

stages:
  - prepare
  - format
  - lint
  - check
  - build
  - test

# Prepare dependencies once and share across all jobs
prepare:
  stage: prepare
  image: rust:latest
  extends: .cargo_cache
  script:
    - rustc --version
    - cargo --version
    - cargo fetch --locked
  artifacts:
    paths:
      - .cargo/
      - Cargo.lock
    expire_in: 1 hour

# Run cargo check
cargo-check:
  stage: check
  image: rust:latest
  extends:
    - .cargo_cache
    - .install_protoc
  needs:
    - prepare
  script:
    - cargo check --workspace --all-targets --all-features --locked

# Run cargo fmt check
cargo-fmt:
  stage: format
  image: rust:latest
  script:
    - rustup component add rustfmt
    - cargo fmt --all -- --check

# Run cargo clippy
cargo-clippy:
  stage: lint
  image: rust:latest
  extends:
    - .cargo_cache
    - .install_protoc
  needs:
    - prepare
  script:
    - rustup component add clippy
    - cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

# Run rumdl check
rumdl-check:
  stage: lint
  image: rust:latest
  needs:
    - prepare
  script:
    - cargo install rumdl --locked
    - export PATH="$CARGO_HOME/bin:$PATH"
    - rumdl check --diff --exclude .cargo
  cache:
    key: rumdl-tools
    paths:
      - .cargo/bin/rumdl

# Build the project
cargo-build:
  stage: build
  image: rust:latest
  extends:
    - .cargo_cache
    - .install_protoc
  needs:
    - prepare
  script:
    - cargo build --workspace --all-features --locked --release
  artifacts:
    paths:
      - target/release/
    expire_in: 1 day

# Run tests
cargo-test:
  stage: test
  image: rust:latest
  extends:
    - .cargo_cache
    - .install_protoc
  needs:
    - prepare
  script:
    - cargo test --workspace --all-features --locked --all-targets
