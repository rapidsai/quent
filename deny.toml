[graph]
# If you use workspace feature unification, all-features might produce false
# positives for crates that are only used with a subset of features enabled.
all-features = true

[advisories]
# The lint level for security vulnerabilities.
version = 2
ignore = [
    # atomic-polyfill is unmaintained (pulled in via postcard -> heapless),
    # no safe upgrade is available.
    "RUSTSEC-2023-0089",
]

[licenses]
# Workspace-private crates (publish = false) are excluded from license checks.
private = { ignore = true }
# List of explicitly allowed licenses.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
]
# Confidence threshold for license detection (0.0 - 1.0).
confidence-threshold = 0.8

[bans]
# Lint level for when multiple versions of the same crate are detected.
multiple-versions = "warn"
# Deny specific crates entirely.
deny = []
# Allow specific duplicate crate versions if necessary.
skip = []
skip-tree = []

[sources]
# Lint level for what to happen when a crate from a crate registry that is
# not in the allow list is encountered.
unknown-registry = "deny"
# Lint level for what to happen when a crate from a git repository that is
# not in the allow list is encountered.
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
