syntax = "proto3";

package quent.collector.v1;

service Collector {
  // Request to set up an event stream.
  //
  // Must include metadata key "engine-id": "<uuid string>".
  rpc CollectEvents(stream CollectEventRequest) returns (CollectEventResponse);
}

message CollectEventRequest {
  // Fow now, don't bother with laying out the entire model in a Protobuf type definition.
  // We're mainly just using Tonic to generate a quick client/server implementation for us.
  repeated bytes event = 1;
}
message CollectEventResponse {}
