[workspace]
resolver = "3"
members = ["crates/collector", "crates/proto", "crates/events"]

[workspace.package]
version = "0.1.0"
edition = "2024"

[package]
name = "quent"
version.workspace = true
edition.workspace = true

[workspace.dependencies]
uuid = {version = "1.18.1", features = ["v7"]}
log = {version = "0.4.28", features = ["kv"]}
tokio = "1.48.0"
tonic = "0.14.2"
prost = "0.14.1"
tonic-prost = "0.14.2"

[dependencies]
uuid.workspace = true
quent-events = { path = "crates/events" }
quent-proto =  { path = "crates/proto" }
tokio = { workspace = true, features = ["rt-multi-thread", "sync"]}
