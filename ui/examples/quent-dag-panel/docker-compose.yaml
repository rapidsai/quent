services:
  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    environment:
      # Allow browser requests to Grafana from local backend origin.
      GF_SERVER_CUSTOM_RESPONSE_HEADERS_ACCESS_CONTROL_ALLOW_ORIGIN: http://localhost:5173
      GF_SERVER_CUSTOM_RESPONSE_HEADERS_ACCESS_CONTROL_ALLOW_METHODS: GET,POST,PUT,PATCH,DELETE,OPTIONS
      GF_SERVER_CUSTOM_RESPONSE_HEADERS_ACCESS_CONTROL_ALLOW_HEADERS: Accept,Authorization,Content-Type
      GF_SERVER_CUSTOM_RESPONSE_HEADERS_ACCESS_CONTROL_ALLOW_CREDENTIALS: "true"
