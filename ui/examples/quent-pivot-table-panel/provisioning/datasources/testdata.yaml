# Provisions Grafana's built-in TestData datasource with a stable uid that
# the demo dashboard references. The TestData plugin ships with Grafana —
# nothing to install.
apiVersion: 1

datasources:
  - name: TestData
    type: grafana-testdata-datasource
    uid: quent-pivot-testdata
    isDefault: true
    editable: true
