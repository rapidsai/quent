# Local-dev Grafana with the unsigned plugin mounted in plus a provisioned
# TestData datasource and demo dashboard so the example is one-command:
#
#   pnpm dev      # in one terminal — webpack watch into ./dist
#   pnpm server   # in another      — boots Grafana on http://localhost:3000
#
# Login is admin / admin (Grafana defaults). The demo dashboard appears under
# the "Quent Examples" folder at /d/quent-pivot-demo.
services:
  grafana:
    image: grafana/grafana:12.0.0
    ports:
      - '3000:3000'
    environment:
      # Required because the plugin is unsigned in dev.
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: 'quent-pivottable-panel'
      GF_DEFAULT_APP_MODE: 'development'
      GF_LOG_LEVEL: 'info'
    volumes:
      - ./dist:/var/lib/grafana/plugins/quent-pivottable-panel
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - grafana-data:/var/lib/grafana

volumes:
  grafana-data:
